# Config Prometheus khusus mode docker-compose (target = host.docker.internal).
# Untuk menjalankan Prometheus native (bukan docker), pakai 2.prometheus.yml.
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "telco_churn_exporter"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "model-serving"
          owner: "epamemo"
